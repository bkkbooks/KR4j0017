body:
  text: 聖求詞序世謂少游詩似曲子瞻曲似詩其然乎至荆公桂枝香詞子瞻稱之此老真野狐精也詩詞各一家惟荆公備衆作艷體雖樂府柔麗之語亦必工緻真一代奇材後數十年當宣和末有吕聖求者以詩名諷詠中率寓愛君憂國意不但弄筆墨清新俊逸而已其憂國詩云憂國憂身到白頭此生風雨一沙鷗又云尚喜山河歸帝子可憐麋鹿入王宫痛傷詩云塵斷征車闕雲低闕帳深古今那有此天地亦何心釋憤詩云未前嵇紹血誰發諫臣章赤心皆闕詩史氣象搢紳巨賢多錄藁家藏但不窺全袟未能為刋行也一日復得聖求詞集一編婉媚深窈視美成耆卿伯仲耳余因念聖求詩詞俱可以傳後惜不見他所著述以是知世間奇才未乏也士友輩將刻聖求詞求序於余故余得言其大槩聖求居嘉興名濱老嘗位周行歸老於家云嘉定壬申中秋朝奉大夫成都路轉運判官趙師㞧序
