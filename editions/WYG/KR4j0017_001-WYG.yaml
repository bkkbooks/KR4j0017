body:
  text: 聖求詞宋吕濱老撰薄倖青樓春晩晝寂寂梳匀又懶乍聼得鴉啼鶯弄惹起新愁無限記年時偷擲春心花間隔霧遙相見便角枕題詩寳釵貰酒共醉青苔深院怎忘得迴廊下攜手處花明月滿如今但暮雨蜂愁蝶恨小窓閒對芭蕉展却誰拘管儘無言閒品􅌙箏淚滿參差雁腰支漸小心與楊花共逺望海潮側寒斜雨微燈薄霧忽忽過了元宵簾影䕶風盆池見日青青栁葉柔條碧草皺裙腰正晝長烟煖蜂困鶯嬌望處凄迷半篙緑水浸斜橋孫郎病酒無聊記烏絲醉語碧玉風標新燕又雙蘭心漸吐嘉期趂取花朝心事轉迢迢但夢隨人逺心與山遙悞了芳音小窓斜日對芭蕉側寒坊本作惻寒非詳見跋中云半篙綠水浸斜橋一本作半篙綠水斜橋按譜應作七字句選冠子雨濕花房風斜燕子池閣晝長春晚檀盤戰象寳局鋪棊籌畫未分還嬾誰念少年齒怯梅酸病疎霞盞正青錢遮路緑絲明水倦尋歌扇空記得小閤題名紅牋青製燈火夜深裁剪明眸似水妙語如弦不覺曉霜雞喚聞道近來箏譜慵看金鋪長掩瘦一枝梅影回首江南路逺又風約晴雲花乾宿露簾幕萬家清曉青帘賽酒小塢藏春冶葉艶枝相照羊駕小車笑逐遊人逺迷芳草更紅英飛舞繡茵連接霧臺烟沼年少日細馬戎韉紅靴玉帯同指軟塵西笑珍珠戲擲彩筆搜竒不覺暮春鶯老誰見這廻霜㸃染衰事縈懐抱訴一春心事燕子周遮來了念奴嬌贈希文寵姬暮雲收盡霽霞明高擁一輪寒玉簾影横斜房户静小立啼紅䔩䔩素鯉頻傳蕉心微展雙蘂明紅燭開門疑是故人敲撼窓竹長記那裏西樓小寒窓静盡掩風箏鳴屋淚眼燈光情未盡儘覺語長更促短短霞杯温温羅帊妙語書裙幅五湖何日小舟同泛春綠情久長鎖窓夜永無聊盡作傷心句甚近日帶紅移眼梨臉揮雨春心償未足怎忍聴啼血催歸杜宇莫帆挂沉沉暝色衮衮長江流不盡來無據㸃檢風光歲月今如許趂此際浦花汀草一棹東去雲忩霧閣洞天曉同作煙霞伴侣算誰見梅簾醉夢栁陌晴遊應未許春知處又冰梁跨水沉沉霽色遮千里怎向我小舟孤楫天外飄逐夜寒侵短髮睡不穩牕外寒風漸起歲華暮蟾光射雪碧瓦飄霜塵不動寒無際雞咽荒郊夢也無歸計擁繡枕斷魂殘魄清吟無味想伊睡起又念逺樓閣横枝對倚待歸去西窓剪燭小閤凝香深翠幙饒春睡滿江紅晩浴新涼風蒲亂松梢見月庭隂静暮蟬啼歇螢遶井闌簾入燕荷香蘭氣供搖箑頼晩來一雨洗游塵無些熱心下事峰重疊人甚處星明滅想行雲應在鳳凰城闕曾約佳期同菊蕋當時共指燈花説據眼前何日是西風凉吹葉又笑語移時風影亂半簾寒日鮮明是晩來妝飾共説西園攜手處小橋深竹連苔色到如今梧葉染清霜封行跡春未透梅先折人縱健時難得想明年虛過上元寒食數著佳期愁入眼雨珠零亂梨花溼任翠鬟欹側背斜陽鳴瑤瑟又燕拂危檣斜日外數峰凝碧正暗潮生渚暮風飄席初過南村沽酒市連空十頃菱花白想故人輕箑障遊絲聞遙笛魚與雁通消息心與夢空牽役到如今相見怎生休得斜把琵琶傳宻意一襟新月横空碧問甚時同作醉中仙煙霞客又次楊子耕韻山遶呉城修竹外滿林團碧任孤檣百丈逺牽江色政簡民閒無一事同遊仍是鴛鸞客到晩年遺愛續新題都堪説修門賦今誰續痛飲士天應惜正彩霞垂帔暮風飄瑟笑疾禪癡今在否風燈石火同飄忽去醉鄉深處著身心休銘櫛醉蓬萊任落梅鋪綴雁齒斜橋裙腰芳草閒伴遊絲過曉園庭沼厮近清明雨晴風軟稱少年尋討碧縷墻頭紅雲水靣栁堤花島誰信而今怕愁憎酒對著花枝自疎歌笑鶯語丁寧問甚時重到夢筆題詩帊綾封淚向鳳簫人道處處傷懐年年逺念惜春人老齊天樂觀競渡香紅飄沒明春水寒食萬家遊舫整整斜斜疎疎宻宻簾纈旗紅相望江波蕩漾稱彩艦龍舟繡衣霞槳舞楫爭先歌笑簫鼓亂清唱重來劉郎老對故園桃紅春晩盡成惆悵淚雨難晴愁眉又結翻覆十年手掌如今怎向念舞板歌塵逺如天上斜日囬舟醉魂空舞颺沁園春復把元宵等閒過了算來告誰整二年三歲樽前笑處知他啟了多少歌詩豈信如今不成些事還是無聊空皺眉爭知道寃家悞我日許多時心兒轉更癡迷又疑道清明得共伊但自家晩夜多方遣免不須煩惱两月為期用破身心博些歡愛有后不成人便知從來是這風流伴侣有分雙飛滿路花同栁仲修在趙屯西風秋日短小雨菊花寒斷雲低古木暗江天星娥尺五佳約悞當年小語憑肩處猶記西園畫橋斜月䦨干鳥啼花落春信遣誰傳尚容清夜夢小留連青樓何處寳鏡注嬋娟應念紅牋事微暈春山背窻愁枕孤眠驀山溪韻髙格妙不數閒花草向晚小梳粧換一套新衣始了横釵整鬂倚醉唱清詞房户静酒盃深簾幙明殘照揚州一夢未盡還驚覺自恁在心頭拈不出何時是了呉霜㸃鬂春色老劉郎雲路逺晩溪横誰見桃花笑又元宵燈火月淡遊人可攜手步長廊又説道傾心向我歸來一夢整整十年餘人似舊去無因牽惹情懐破章臺楊栁聞道無關鎖行客挽長條情不似當初些箇而今休也搖落任東風但恣意儘留情我也知無那千秋歲寳香盈袖約腕金條瘦裙兒細襇如眉皺笑多簪髻側語小絲篁奏洞房晚千金未直横波溜緣短懽難又人去春如舊枝上月誰攜手宿雲迷逺夢淚枕中殘酒怎奈向繁隂亂葉梅如豆早梅芳近畫簾深粧閣小曲徑明花草風聲約雨暝色啼鴉暮天杳染眉山對碧匀臉霞相照漸更衣對客微坐自輕笑醉紅明金葉倒恣看還新好瑩注粉淚滴爍波光射庭沼犀心通密語珠唱翻新調佳期定約秋了醉落魄明窓讀易時才人地俱超軼偶然一墮槐安國説利談功這事怎休得何將置酒圖書室揮絃目送西飛翼夜來已覺春篘溢月影三人一醉舊相識又纎鞋窄襪紅茵自稱琵琶拍明衣妝臉春梳掠好好亭亭那得恁標格怱怱一醉霜華白歸來偏記藍橋宅五更殘夢迷蝴蝶覷著花枝只被繡簾隔惜分飛元夕白玉花驄金絡腦十里華燈相照簾映春窈窕霧香殘膩桃花笑一串歌珠雲外裊飲罷玉樓寒悄歸去城南道栁梢獵獵東風曉浣溪沙烟栁濛濛鵲做巢青青弱草帶斜橋鶯聲多在杏花梢逐伴不知春路逺見人時著小詞招阿誰有分伴吹簫又彩選骰兒隔袖拈整釵微見玉纎纎夜寒窓外更垂簾好事燈花雙作蕋照人月影入斜簷新愁日日座中添又做得因緣不久長驚風枝上偶成雙歸來魂夢帶幽香燈下揉花春去早竹間影月索歸忙十年前事費思量漁家傲作浮圖語送深上人遊廬山聞道廬山横廣澤晴空萬頃波濤白上有至人營窟宅經遊客古今多是烟霞謫一鉢上人輕六翮選場要射如來策㸃化黄金非妙藥難堪酌三生一口都吞却又昨夜山空流石乳道人妙手親拈取未欲凌雲歸洞府清風舉大千一葉同掀舞笑把須彌撾破鼔東山雲作西山雨我欲住菴無拄斧君相許三更明月湖心午又潦倒瞿曇饒口悄拈花寃道頭陁笑雞足山中眠未覺誰知道至今功業猶分剖脣口周遮何日了禪牀四靣藤蘿遶有箇路頭君試討梅花老南園蝴蝶飛芳草又髙絆袈裟挑紙帔一杯茶罷成行計路入廬山風細細輕彈指百千三昧俱遊戲法椅何曾燒两臂誰知紙上無窮意欲識普賢真實際齁齁地小爐雪夜和衣睡又頂上鐡輪飛火焰防身細按威神劒體用雙行誰敢覘光閃閃何須更把茶林撼衲子家風存古儉一條楖栗如天塹粥鼓未鳴燈火暗無恩念斷崖古朩横藤蕈又落月杜鵑啼未了粥魚忽報千山曉笠子葢頭衣鉢少穿林表回頭高刹空中小官路舊多林朩遶露濃花蕋皆顛倒渡水登山排草草廬山好香爐峰下湖波渺思佳客江上何人一笛横倚樓吹得月華生寒風墮指傾三弄小市收燈欲二更持蟹股破霜橙玉人水調品􅌙箏細看桃李春時靣共盡玻璃酒一觥又微㸃胭脂暈淚痕更衣整鬂立黄昏春風攪樹花如雨夕靄迷空燕趂門題往事錦回紋春心無定似行雲深屏繡幌空愁獨明月梨花殢一樽好事近别酒帶愁酸千里失羣黄鵠行到小橋梯下便飛雲南北不妨垂手小徘徊日影轉闌曲從此賀囊佳製有新竒題目又飛雪過江來船在赤欄橋側惹報布帆無恙著两行親札從今日日在南樓髮自此時白一詠一觴誰共負平生書册又年少萬函書朱紫只應低拾更頼主人明眼作青雲梯級歸來應是印纍纍笳鼔閙鄉邑若訪老人生計販謝郎蓑笠又雲影䕶梅枝短短未禁飛雪彩幅自題新句作催粧佳闋西樓昨夜五更寒恐一枝先發元是素娥無寐駕半輪明月又小飲破清寒坐久困花頽玉两行艶衣明粉聴阿誰拘束麗華百媚坐來生仙韻動羣目一曲鳳簫同去倦人間絲竹天仙子代人送希文樓下轆轤横露井樓上嬋娟開曉鏡下樓難忘上樓時風未定帆不正蔌蔌珍珠揮麈柄眉上新愁吹不醒别酒未斟歌未忍雪中梅下定重來烟暝暝腸寸寸莫放笛聲吹落盡燕歸梁樓外東風杜宇聲雙枕細眉顰女郎番馬小山屏金籠冷夢魂驚起來重綰雙羅髻無個事淚盈盈楊花蝴蝶亂分身飛不定暮雲晴小重山七夕病中半夜燈殘䑕上檠上窓風動竹月微明夢魂偏記水西亭琅玕碧花影弄蜻蜓千里暮雲平南樓催上燭晚來晴酒䦨人散斗西傾天如水團扇撲流螢河傳斜紅照水似晴空萬里明霞相倚逐伴笑歌小立綠槐隂裏誚沒些春氣味紛紛覷著閒桃李淺淺深深不滿遊人意幽艶一枝向晚重簾深閉是青君愛惜底清平樂上元趙仲能窓水缾石硯敗壁蝸書篆窓下日舒縫衲線屋角晩風飛霰上元燈火佳時長廊語笑追隨高卧一番紙帔覺來月貫南枝握金釵風日困花枝晴蜂自相趂晩來紅淺香盡整頓腰肢暈殘粉絃上語夢中人天外信青杏已成雙新樽薦櫻笋為誰一和銷損數著佳期又不穩春去也怎當他清晝永又向晩小粧匀明窓倦裁剪見花清淚遮眼開盡繁桃又春晩心下事比年時都較懶胡蝶入簾飛郎聲似鶯囀見來無計拘管心似芭蕉乍舒展歸去也夕陽斜紅滿院南歌子策杖穿荒圃登臨笑晩風無窮秋色蔽晴空遙見夕陽江上捲飛蓬雁過菰蒲逺山遙夢寐通一林楓葉墮愁紅歸去莫煙深處聴疎鐘又逺色連朱閣寒鴉噪夕陽小爐温手酌鵝黄掩亂一枝清影在寒牕念逺歌聲小嗔歸淚眼長纎腰今屬冶遊郎朝暮楚宫雲雨恨忙忙蝶戀花風洗遊絲花皺影碧草初齊舞鶴閒相趂短夢乍回慵理鬢驚心忽數清明近逐伴强除眉上恨趂蝶西園不覺鞋兒褪醉笑眼波横一寸微微酒色生紅暈又花色撩人紅入眼可是東君要得人腸斷欲訴深情春不管風枝雨葉空撩亂漫插一枝飛一醆小賞幽期破我平生願珍約未成春又短但憑蝴蝶傳深怨品令繡衣未整傍窓格臨清鏡新霜薄霧這下幾日隂晴不定欲插黄花心事又還記省去年香徑共粉蝶間相趂寳香玉珮暗解付與多情荀令何日西樓重見暮帆烟艇祝英臺寳蟾明朱閣静新燕近簾語還記元宵燈火小橋路逢迎春筍柔微凌波纎穩誚不顧斗斜三鼓甚無據誰信一霎是春鶯聲留不住栁色苔痕風雨暗花圃細看羅帶銀鈎綃巾香淚算不枉那時分付水調歌頭十月初十日同周元發謁姚氏昆季多不遇因與説道小飲出其兄進道作水調歌頭一韻幾二十首讀之殆不勝情次其韻作一篇懐其人亦以贈元發説道扁舟思獨往檣影劃晴煙要伴人隨明月踏破水中天誰信騎鯨高逝空對筆端風雨如汎楚江船老子窮無頼端欲把降竿白蘋汀歸老計似高閒平生愛我一言相置二劉間準擬何山松桂折足鐺能安穩芋火對闌殘何必少林語立雪問心安又明日純中以酒見貺約郎見過徘徊江上久不至復次其韻江湖堪極目非霧亦非烟故人相見縱横高義薄雲天巳具萸樽茗話悵望雲中江樹不見子猷船日色隱林表十里認帆竿百年中無個事且安閒功名两字茫然都墮有無間且盡身前一醉休問古來今往及取菊花殘仙事占無據竹帛笑劉安又壬寅九月謁季修題其書室壁曰秋齋夢謁復以進道韻續之秋齋多夢謁舌本欲生烟獨步一庭明月雁字巳横天作個生涯不遂松竹雨荒三徑却憶五湖船小阮貧尤甚犢鼻挂長竿白鷗汀風共水一生閒横琴唳鶴要攜妻子老雲間燈火熒熒深夜高卧南窓折几杯到不留殘莫遣江湖手遮日向長安又壬寅十月二十四日飲少酒徑醉擁案而寢中夜酒醒次其韻作一篇心肝皆錦繡落筆盡雲烟詩狂酒興要騎赤鯉上青天織女回車相勞指㸃虗無征路翻動月明船舉手謝同輩豈復念漁竿我平生心正似白雲閒衣冠汚我偶逢遊戲到人間常念孤雲高妙若作轆轤俯仰誰復食君殘拜塵金谷輩都是卧崇安又哭進道飛橋自古雙溪合檉栁如今夾岸垂么金店别業詩詩人翻水盡寂寞五侯烟醉魂何在應騎箕尾列青天記得平生談笑夾岸手栽楊栁同泛夜深船溪水還依舊深淺半青竿小神仙殷七七許閑閑黄粱未熟經遊都在夢魂間我厭囂塵濁味幾欲凌雲羽化雞犬不留殘俗事丹砂冷且抱一枝安又陳性孺不相見十年矣今在雲間欲襆被訪之大病遂已次其韻而寄之暮雲遮逺眼疊疊入青烟十年不見醯雞同舞瓮中天聞道山隂回棹相去都無百里李郭可同船行止皆天意端欲自操竿功名事須早計莫安閒高才妙手不當留意市廛間俄巳山林長往塵靣時時拂鏡齒髮甚衰殘廊廟非吾事茅屋且安安又與小飲撫牀多感慨白髮困風烟出門有礙更堪寒暮雪飛天君棄一盂一衲奔走五湖清海杯度不乗船來訪山中友共擬把魚竿看人間誰得似謫僊閒生涯不問留情多在酒杯間剪燭西風談笑零落一樽相對不覺巳更殘回首功名事牋記謝任安又送季修同希文去秀十年禪榻畔風雨颺茶烟跳丸日月未甘白髪困堯天江左風流才子要伴江湖張翰同泛洛陽船酌酒情無盡海燕遶船竿逼人來功業事不敎閒男兒三十定當談笑在堂間老子婆婆貧態閉户長鬚赤脚他日要分殘禹浪桃花影歸棹正輕安何山道人水調歌頭二十首一韻余和之計前後凡八首道人之語如謝康樂詩出水芙蓉自然可愛余誠不足以繼其後嗚呼道人死矣僊耶人耶皆不知俟如其數焚香燒以與之魂如有靈當淩雲一笑江城子曉參垂户宿酲醒坐南亭對疎星㸃㸃螢光偏向竹梢明望斷長空何處是雲葉亂彩霞横西樓依舊抱重城小銀屏此時情鴉陣翻叢枯栁两三聲欹枕欲尋初夜夢雞唱逺曉蟾傾又聞君見影巳堪憐短因緣偶同筵相見無言分散倍依然做夢楊花隨去也粧閤畔繡牀前覺來離緒意綿綿寫蠻牋倩誰傳魚雁悠悠門外水如天欲上西樓還不忍難著眼望秋千水龍吟寄竹西五湖春水茫茫夢魂夜逐楊花去汀花岸草佳人微笑眼波横注借問劉郎心期則甚一成無據自春來淚滿挼藍袖口沒整頓心情處聞道相如病渴念文君白頭新句相思两地光窮烟水一庭花霧錦字藏頭織成機上一時分付問他年更有㣲雲淡月重来兮未減字木蘭花雨簾高捲芳樹隂隂連别館涼氣侵樓蕉葉荷枝各自秋前溪夜舞化作驚鴻留不住愁損腰肢一桁香銷舊舞衣又明眸巧笑坐久更宜燈燭照小醉辭歸懐抱明明只自知瑣窓重見桃李春風三月靣怎不思量折栁孤吟斷殺腸江城子慢新枝媚斜日花徑霽晩碧泛紅滴近寒食蜂蝶亂㸃檢一城春色倦遊客門外昏鴉啼夢破春心似遊絲飛逺碧燕子又語斜簷行雲自沒消息當時烏絲夜語約桃花時候同醉瑤瑟甚端的看看是榆莢楊花飛擲怎忘得斜倚紅樓回淚眼天如水沉沉揺翠璧想伊不整啼粧影簾側如夢令百和寳釵香珮短短同心霞帶清鏡照新粧巧畫一雙眉黛多態多態偷覷榴花窓外極相思拂墻花影飄紅微月辨簾櫳香風滿袖金蓮印歩狹徑迎逢笑靨乍開還斂翠正花時却恁西東别房初睡斜門未鎖且更從容又西園鬬草歸遲隔葉囀黄鸝闌干醉倚秋千背立數遍佳期寒食清明都過了趂如今芍藥薔薇衩衣吟露歸舟䌫月方解開眉賀新郎别竹西斜日封殘雪記别時檀槽按舞霓裳初徹唱煞陽關留不住桃花靣皮似熱漸㸃㸃珍珠承睫門外潮平風席正指佳期共約花同折情未忍帶雙結釵金未斷腸先結下扁舟更有暮山千疊别後武陵無好夢春山子規更切但孤坐一簾明月蠶共繭花同蔕甚人生要見底多離别誰念我淚如血浪淘沙倚枕數更籌清夜悠悠竹風荷露小窓秋往事迷人渾不省總是離愁無頼是横眸濟楚風流一時摟攬著心頭調數夢魂將我去明月重樓思佳客深夜槐風解宿醒露荷涼氣滿西亭凭欄小語花梢月緩步偷拈石上螢秋意早暑衣輕殢人索酒復同傾大家沉醉還高枕一任西樓報五更二郎神西池舊約燕語栁梢桃萼向紫陌秋千影下同綰雙雙鳳索過了鶯花休則問風共月一時閒却知誰去喚秋隂滿眼敗紅藥飄泊江湖載酒十年行樂甚近日傷髙念逺不覺風前淚落橘熟橙黄堪一醉斷未負晩涼池閣只愁被撩撥春心煩惱怎生安著百宜嬌隙月垂箆亂蛩催織秋晩嫩涼房户燕拂簾旌䑕窺窓網寂寂飛螢來去金鋪鎮掩漫記得花時南浦約重陽萸糝菊英小樓遙夜歌舞銀燭暗佳期細數簾幙漸西風午窓秋雨葉底翻紅水靣皺碧燈火裁縫砧杵登髙望極正霧鎖官槐歸路定須將寳馬鈿車訪吹簫侣醉思僊斷人腸正西樓獨上愁倚斜陽稱鴛鴦鸂䳵两两池塘春又老人何處怎慣不思量到如今瘦損我又還無計禁當小院呼盧夜當時醉倒殘缸被天風吹散鳳翼難雙南窓雨西樓月尚未散拂天香聴鶯聲悄記得那時舞板歌梁眼兒媚曉釵催鬢詰南風碧澗小橋通榆隂短短露光炯炯滿地花紅天涯不見歸帆影蜂蝶儘西東宿酲漸解殘粧猶在曉日簾櫳又循檻琅玕粉沾衣一片子規啼蓬壺夢短蜀衾香逺愁損腰肢石城堂上雙雙燕應傍莫愁飛春江艇子雪中梅下知與誰期夢玉人引上危梯望畫閣迥晝簾垂曲水飄香小園鶯喚春歸舞袖弓彎正滿城烟草凄迷結伴踏青趂蝴蝶一雙飛賞心歡計從别後無意到西池自撿羅囊要尋紅葉留詩嬾約無憑據鶯花都不知怕人問强開懐細酌一酴醿傾盃令楓葉飄紅蓮房肥露枕席嫩涼先到簾外蟾華如掃枝上啼鴉催曉秋風又送潘郎老小窓明疎螢淺照登高送逺惆悵白髮至今未了又隔座藏鈎分曹覆射燭艷漸催三鼓筝按敎坊新譜樓外月上春浦徘徊爭忍忙歸去怕明朝無情風雨珍花美酒團坐且作尊前笑侣生查子攤錢臨小窓撲蝶穿斜徑醉戲晚風前吹亂連枝影别來秋夜長夢到金屏近腸斷一聲雞殘月懸朝鏡又裙長步漸遲扇薄羞難掩鞋褪倚郎肩問路眉先斂踏青南陌回倚醉開嬌靨今夜更同行忍笑匀粧臉又雙鬟綠髮齊多笑蔫紅落穿竹過西齋問字時偷學嬌慵不慣羞同倚闌干角屈指數元宵燈火堪行樂撲蝴蝶近分釵綰髻洞府難分手離觴短闋啼痕冰舞袖馬嘶霜滑橋横路轉人依古栁曉色漸分星斗怎分剖心兒一似傾入離愁萬千斗垂鞭佇立傷心還病酒十年夢裏嬋娟二月花中荳蔲春風為誰依舊又風荷露竹秋意侵疎鬢微燈曲几有簾通桂影乍涼衣著輕明微醉歌聲審聴穩新愁殢人方寸怎不悶當初欲憑燕翼西飛寄歸信小窓睡起梁間都去盡夜長旅枕先知秋杪黄花漸近一成為伊銷損一落索蟬帯殘聲移别樹晚涼房户秋風有意染黄花下幾㸃凄涼雨渺渺雙鴻飛去亂雲深處一山紅葉為誰愁供不盡相思句又宫錦裁書寄逺意長辭短香蘭泣露雨催蓮暑氣昏池館向晩小園行遍石榴紅滿花花葉葉盡成雙渾似我梁間燕又鳥散餘花飛舞滿地風雨長江衮衮接天流夜送征帆去今夜行雲何處斷腸南浦殘燈不剪五更寒獨自與餘香語謁金門甲子年同寅伯題于壁人已老春亦不留些少花盡葉長蠶又把子規啼未了往事不論多少且向樽前一笑白髮滿頭愁已到路長波渺渺鼓笛慢拍肩笑别洪崖共看紫海還清淺蓬壺舊約人間舒笑桃紅千遍去歲爭春今年逼臘滿空飄霰漸横枝照水清絲弄日都㸃綴江南岸須吸百川為夀捲恩波已傾銀漢戎袍擁㦸萬釘圍帯天孫新眷十里塵香五更弦月未收絃管正􅌙箏續譜宫簫定拍候來冬按西江月慢春風淡淡清晝永落英千尺桃杏散平郊晴蜂來往妙香飄擲傍畵橋煑酒青帘綠楊風外數聲長笛記去年紫陌朱門花下舊相識向寳帕裁書憑燕翼望翠閣烟林似織聞道春衣猶未整過禁烟寒食但記取角枕情題東窓休悞這些端的更莫待青子綠隂春事寂思佳客竹西從人去數年矣今得歸偶以此煩全美退之曾醉揚州十里樓竹西歌吹至今愁燕銜栁絮春心逺魚入晴江水自流情渺渺夢悠悠重尋羅帯認銀鈎挂帆欲伴漁人去只恐桃花悞客舟又全美久不通偶伯禧去間録前所賦復作一首薄薄山雲欲溼花雙雙燕子入簾斜西樓尚記垂垂雪酌酒猶殘片片霞人巳逺髮成華小樓疎竹宅誰家試憑去雁通消息僊子當乗八月槎夜遊宫生日代人獻江宰簾外繁霜未掃樓角動玉繩横曉百和交焚瑞烟遶霽霞明畵屏深天渺𣺌喜色連池沼薦眉夀玉兒嬌小早晩除書下天表日初長莫等閒孤一笑浣溪沙風掃長林雪壓枝紛紛凍鵲傍簾飛一樽聊作破寒威春意正愁梅漏泄客情尤怕病禁持曲䦨干外日初遲南歌子片片雲藏雨重重霧隱山可憐新月似眉彎今夜斷腸凝望小樓寒夢斷雲房逺書長蠟炬殘夜粧應罷短屏閒都把一春心事付梅酸如夢令珠閣雨簾髙捲望斷碧梧墻院短夢有幽尋曉枕一峰雲亂誰見誰見風散菊英千片浣溪沙微綻櫻桃一顆紅斷腸聲裏唱玲瓏輕羅小扇掩酥胸惹鬢蛛絲新有喜窺窓月彩舊相從清宵一醉許誰同浪淘沙涼露洗秋空菊徑鳴蛩水晶簾外月玲瓏燭蕋雙懸似玉蔌蔌啼紅宋玉在墻東醉袖搖風心隨月影入簾櫳戲著錦茵天様逺一段愁濃醉桃源檀香新染砑紅綾腰肢瘦不勝合歡小幌掩餘酲芙蓉入夢頻山不盡水無情錦河隔錦茵劉郎僊骨未應輕桃花巳悞人思佳客夢裏相逢不記時斷腸多在杏花西做開笑語兜鞋急逺有燈光掠鬢遲辭永夜失深期一枝黄菊對傷悲夜涼窓外聞裁剪應熨沉香製舞衣小重山雨洗簷花溼畵簾知他因甚地瘦厭厭玉人風味似冰蟾愁不見烟霧曉來添煩惱舊時諳新來一段事未心甘滿懐離緒過春蠶燈殘也誰見我眉尖栁梢青逺簾籠月誰見南陌子規啼血萸糝菊英整冠落㡌一時虛説五湖自有深期曾指定燈花細説燕子巢空秋鴻程逺音書中絶卜算子雲破月高懸照我雙雙淚人在朱橋轉曲西翠幕重重閉要見索商量見了還無計心似長檠一㸃燈到曉清清地又眉為占愁多鎮日長長斂試問心中有底愁淚早千千㸃莫唱短因緣緣短猶傷感誰信蕭郎是路人常有深深念又一日抵三秋半月如千歲自夏經秋到雪飛一向都無計續續説相思不盡無窮意若寫幽懐一段愁應用天為紙又得酒解愁煩多病還疎酒本是多情失意人此味如何受沉醉且高歌不飲心常有守著殘燈鬬著眉怎不腰肢瘦如夢令多謝西池桃李伴我一春沉醉能有幾多香陪了一江來淚憔悴憔悴又是落花鋪地木蘭花慢石榴花謝了正荷葉葢平地試瑪瑙杯深琅玕簟冷臨水簾帷知他故人甚處晩霞明斷浦栁枝垂唯有松風水月向人長似當時依依望斷水窮雲起處是天涯奈燕子樓高江南夢斷虛費相思新愁暗生舊恨更流螢弄月入紗衣除却幽花軟草此情未許人知又重午對修篁萬個更疎雨洗琅玕望燕外晴絲鷗邊水葉胡蝶成團榴紅勸人把酒汎菖蒲對客不成懽金縷新番彩索始知今歲衣寛年年此日青樓花缺處倚闌干記小扇清歌蠻牋妙墨不覺更殘可憐舊遊似夢向人人未減一枝蘭縱有千金莫惜大家沉醉花間又七夕桂郷雲萬縷更飛雨洗香車念密㑹經年銀潢浪阻玉露期賖靈星瑞橋對展散怱怱喜色滿天涯回首丁寧曉角未宜吹動梅花家家競賞彩茸穿桂影醉流霞漸舞袖翻鸞歌聲綴鳳釵影交加人間共饒宴樂算天孫怎忍遣河斜莫惜西樓剪燭大家同到啼鴉戀香衾記得花隂同攜手指定日許我同歡喚做真成熱心安打疊從來不成器待做個平地神仙又却不成些事驀地心殘據我如今沒投奔見著你淚早偷彈對月臨風一味埋冤笑則人前不妨笑行笑裏斗覺心煩怎分得煩惱两處匀攤豆葉黄芰荷香外一聲蟬風撼琅玕驚晝眠刻燭題詩花滿牋小神僊對倚闌干月正圓又晩粧新試碧衫涼金鴨猶殘昨夜香栁際風來月滿廊一雙雙人對鴛鴦浴小塘又輕羅團扇掩微羞酒滿玻璃花滿頭小板齊聲唱石州月如鈎一寸横波入鬢流又林花著雨褪胭脂葉底雙桃結子遲對鏡憑郎略皺眉笑微微燕子羞人必懶歸又玉簫風外一聲清粉靣嬋娟月對明紫府樓臺夜不扃羽衣輕穩駕雙鸞謁帝庭千秋歲寳蟾懸鏡露顆傾荷柄飛螢㸃㸃明花徑凝愁情不展宿酒風還醒天似曉銀河半落星相趂心事都無定才致元相稱春過了秋將近小窓通竹浦野色連金井得仗個多情燕子分明問好事近心事已成空春盡百花零落誰見黄鸝百囀索東君評泊曉來枝上語綿蠻應悔向來錯看則綠隂青子却恓惶無託南鄉子小雨阻行舟人在烟林古渡頭欲挈一樽相就醉無由誰見横波入鬢流百計不遲留明月他時獨上樓水盡又山山又水温柔占斷江南萬斛愁又樊子喚春歸夢逐楊花滿院飛吹過西家人不見依依萍㸃荷錢又滿池屈指數佳期何日憑肩對展眉傾盡十分應不醉遲遲何惜櫻桃杏子時浪淘沙纎指捧玻璃莫惜重持自離閬苑失回期門掩東風桃著子簾影遲遲樓上正横箆荷氣沾衣誰將名玉碾花枝不比尋常紅與紫取次芳菲卜算子余毎為歌詩使李蓮歌之即解人深意自去年七月親往華亭渡口矣余為之輟筆昨夜酒醒卧不能穩試作卜算子以寄之渡口看潮生水滿蒹葭浦長記扁舟載月明深入紅雲去荷盡覆平池忘了歸來路誰信南樓百尺髙不見如蓮步小重山雲䕶柔條雪壓枝斜風吹絳蠟㸃胭脂薔薇柔水麝分臍園林晚脉脉帶斜暉深閣繡簾低寳奩匀淚粉晚粧遲一枝屏外對依依清宵永誰伴破寒巵惜分釵春將半鶯聲亂栁絲拂馬花迎面小堂風暮樓鐘草色連雲暝色連空重重秋千畔何人見寳釵斜照春粧淺酒霞紅與誰同試問别來近日情悰忡忡又重簾挂微燈下背蘭同説春風話月盈樓淚盈眸覷著紅裀無計遲留休休鶯花謝春殘也等閒泣損香羅帕見無由恨難收夢短屏深清夜悠悠悠悠如夢令花趂清明爭展白白紅紅滿院莫怪淚痕多愛底不能得見凝戀凝戀門外雨飛簾捲水龍吟年年九月西湖繡船繼日笙簫擁五雲深處紅簾一桁語鶯歌鳳羣玉峰頭影娥池畔烟霞飛動認蓬瀛仙子雲程路逺貪人世瑤池夢要看黄塵清海戱真珠麻姑清縱曲門自有菊金芳砌月箆浮棟子著宫桃舞翻官栁霞杯纎捧待明年更把西風妙曲按成新弄鵲橋仙西風不落薄衾孤枕記起花時些個宿愁新恨两關心説道理分疎不可别愁如絮佳期何在古屋蕭蕭燈火打窓風雨又何消夢未就依前驚破㸃絳脣聖節鼓子詞扇列紅鸞赭黄日色明金殿御香䓗茜寳仗香風暖咫尺天顔九奏朝陽筦羣臣宴醉霞凝靣午漏傳宫箭又俊眼犀心尊前如有乗鸞便過愁傳怨只許燈光見見了重休河漢明遮斷深深院亂風飄霰揉了雙羅燕水調歌頭解衣同一笑聊復起厨烟醉鄉何處與君舒嘯入壺天長怪時情狹隘杯酒豈容我輩不上謫仙船雅志念湖海小艇一絲竿夜迢迢燈燭下幾心閒平生得處不在内外及中間㸃檢春風歡計惟有詩情宛轉餘事盡疎殘彩筆題桐葉佳句問平安好事近世事莫牽縈樂取這閒時節且恁醉來醒去免光隂虛設有則有個潑心兒不放被利名啜却待两手分付與風花雪月又長記十年前彼此玉顔雲髮尊酒幾番相對樂春花秋月而今各自困飄零憔悴幾年别説著大家煩惱且大家休説青玉案一尊聊對西風醉況九日明朝是曾與茱萸論子細江天虛曠暮林横逺人隔銀河水碧雲漸展天無際吹不斷黄昏淚若作懽期須早計如何得似鬢邊新菊雙結黄金蕋聖求詞
