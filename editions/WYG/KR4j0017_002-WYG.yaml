body:
  text: 跋吕聖求名渭老或云濵老檇李人有聲宣和間其詠梅詞寄調東風第一枝先輩與坡仙西江月並稱兹集中不載不知何故其詞云老樹渾苔横枝未葉青春肯誤芳約背隂未返氷魂陽梢已含紅蕚佳人寒怯誰驚起曉來梳掠是月斜窓外棲禽霜冷竹間幽鶴雲澹澹粉㾗漸薄風細細凍香又落叩門喜伴金樽倚闌怕聽畫角依稀夢裡半面淺窺珠箔甚時重寫鸞牋去訪舊遊東閣又惜分釵其自製新譜也尾句用二叠字云重重又云忡忡較之陸放翁釵頭鳳尾句云錯錯錯莫莫莫更有别韵又喜用險峭字如側寒斜雨之類楊升菴云其用側寒字甚新唐詩春寒側側掩重門韓偓詩側側輕寒剪剪風又無名氏詞玉樓十二春寒側與此側寒相襲用之不知所出大意側不正也猶云峭寒爾今坊本俱作惻寒幾認壹关為壺矢矣古虞毛晉識
